<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaki Box</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <link data-trunk rel="rust" data-wasm-opt="2" data-cargo-no-default-features />
    <script>
        (function() {
            var Orig = window.AudioContext || window.webkitAudioContext;
            if (!Orig) return;
            var list = [];
            window.AudioContext = window.webkitAudioContext = function() {
                var c = new Orig();
                list.push(c);
                return c;
            };
            window.AudioContext.prototype = Orig.prototype;
            function unlock() {
                list.forEach(function(c) { if (c.state === "suspended") c.resume(); });
                document.removeEventListener("click", unlock);
                document.removeEventListener("touchstart", unlock);
            }
            document.addEventListener("click", unlock);
            document.addEventListener("touchstart", unlock);
        })();
    </script>
</body>
</html>
